services:
  # Base de Datos (Emulando Amazon RDS)
  postgres:
    container_name: postgres_db
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    env_file:
      - ../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U prosperas_user -d reports_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Emulador de AWS (SQS, S3, etc.)
  localstack:
    container_name: localstack_main
    image: localstack/localstack:4.14
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,s3
      - AWS_DEFAULT_REGION=us-east-1
      - GATEWAY_LISTEN_PORT=4566
    volumes:
      - "./init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh"
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: [ "CMD", "curl", "-s", "http://localhost:4566/_localstack/health" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # API Backend (FastAPI)
  api:
    container_name: fastapi_reports_api
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  # Background Worker
  worker:
    container_name: fastapi_reports_worker
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: [ "python", "-m", "app.worker.main" ]
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

volumes:
  postgres_data:
