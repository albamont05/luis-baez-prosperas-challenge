services:
  # Base de Datos (Emulando Amazon RDS)
  postgres:
    container_name: postgres_db
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    env_file:
      - ../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U prosperas_user -d reports_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Emulador de AWS (SQS, S3, etc.)
  localstack:
    container_name: localstack_main
    image: localstack/localstack:4.14
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,s3
      - AWS_DEFAULT_REGION=us-east-1
      - GATEWAY_LISTEN_PORT=4566
      - PERSISTENCE=1
      - PERSIST_ALL=1
      - SNAPSHOT_SAVE_STRATEGY=ON_REQUEST # O ON_SHUTDOWN
      - DOCKER_FLAGS=-v /var/run/docker.sock:/var/run/docker.sock
      - SAVE_STATE=1
      - DEBUG=1
    stop_grace_period: 45s
    volumes:
      - "./init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "localstack_data:/var/lib/localstack"
      - "localstack_state:/usr/lib/localstack"
    healthcheck:
      # Usamos el endpoint oficial de salud de LocalStack
      test: [ "CMD", "curl", "-f", "http://localhost:4566/_localstack/health" ]
      interval: 10s # Damos un poco más de margen
      timeout: 5s
      retries: 5

  # API Backend (FastAPI)
  api:
    container_name: fastapi_reports_api
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    restart: always # Recomendado para APIs en desarrollo
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  # Background Worker
  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: [ "python", "-m", "app.worker.main" ]
    deploy:
      replicas: 2
    env_file:
      - ../.env
    environment:
      - AWS_ENDPOINT_URL=http://localstack:4566
    # --- CAMBIOS CRUCIALES AQUÍ ---
    restart: on-failure # Si el worker falla porque la SQS aún no existe, Docker lo reinicia.
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

volumes:
  postgres_data:
  localstack_data:
  localstack_state:
