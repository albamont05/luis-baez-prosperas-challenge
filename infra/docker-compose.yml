services:
  backend:
    image: 352602573667.dkr.ecr.us-east-2.amazonaws.com/prosperas-backend:latest
    container_name: prosperas-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env

  worker:
    image: 352602573667.dkr.ecr.us-east-2.amazonaws.com/prosperas-backend:latest
    restart: always
    command: python -m app.worker.main
    deploy:
      replicas: 2
    env_file:
      - .env
    depends_on:
      - backend

  frontend:
    image: 352602573667.dkr.ecr.us-east-2.amazonaws.com/prosperas-frontend:latest
    container_name: prosperas-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
